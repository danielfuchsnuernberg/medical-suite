<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Suite</title>
<style>
/* ============================================================
   TOKENS  (mirror of tokens.css — in the real repo, replace
   this :root block with <link rel="stylesheet" href="tokens.css">)
   ============================================================ */
:root{
  --bg:#F4F4F6; --surface:#FFFFFF; --surface-2:#FAFAFB; --sidebar:#F0F0F3;
  --border:#E4E4EA; --border-strong:#D2D2DA;
  --text:#1B1B23; --text-muted:#6B6B78; --text-faint:#9B9BA6;
  --accent:#4F46E5; --accent-hover:#4338CA; --accent-active:#3730A3;
  --accent-soft:#EEEDFD; --accent-border:#C9C6F7; --on-accent:#FFFFFF;
  --success:#1E9E62; --success-soft:#E7F5EE; --warning:#C77A12; --warning-soft:#F8EFDF;
  --danger:#D14343; --danger-soft:#FAEAEA; --info:#4F46E5; --info-soft:#EEEDFD;
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --fs-h1:18px; --fs-h2:14.5px; --fs-body:13.5px; --fs-sm:12.5px; --fs-xs:11.5px;
  --fs-label:10.5px; --fs-stat:26px; --fs-mono:12px;
  --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700; --ls-label:.6px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:24px; --sp-6:32px; --sp-7:48px;
  --r-sm:6px; --r-md:10px; --r-lg:14px; --r-pill:999px;
  --shadow-sm:0 1px 2px rgba(20,20,35,.06); --shadow-md:0 6px 18px -8px rgba(20,20,35,.18);
  --shadow-pop:0 14px 40px -12px rgba(20,20,35,.28);
  --bw:1px; --focus-ring:0 0 0 3px var(--accent-soft); --t-fast:.12s ease;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:var(--fs-body);line-height:1.45;-webkit-font-smoothing:antialiased;}
h1,h2,h3{margin:0;line-height:1.2;}
button{font-family:inherit;}

/* ---- layout ---- */
#app{display:grid;grid-template-columns:240px 1fr;height:100vh;}
.side{background:var(--sidebar);border-right:var(--bw) solid var(--border);display:flex;flex-direction:column;padding:18px 12px;overflow:auto;}
.logo{display:flex;align-items:center;gap:10px;padding:6px 8px 18px;}
.logo .mark{width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:#fff;flex:none;}
.logo .name{font-weight:700;font-size:15px;letter-spacing:.2px;}
.logo .name small{display:block;font-weight:500;font-size:11px;color:var(--text-muted);}
.navlabel{font-size:var(--fs-label);font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-faint);padding:14px 10px 6px;}
.nav{display:flex;flex-direction:column;gap:2px;}
.nav button{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--r-sm);color:var(--text-muted);background:none;border:none;font-size:13.5px;font-weight:500;cursor:pointer;text-align:left;position:relative;transition:var(--t-fast);width:100%;}
.nav button svg{width:18px;height:18px;flex:none;}
.nav button:hover{background:color-mix(in srgb,var(--accent) 8%,transparent);color:var(--text);}
.nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:600;}
.nav button.active::before{content:"";position:absolute;left:-12px;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:var(--accent);}
.nav button .ext{margin-left:auto;font-size:9.5px;font-weight:600;letter-spacing:.4px;color:var(--text-faint);border:1px solid var(--border-strong);padding:1px 5px;border-radius:4px;}
.side .bottom{margin-top:auto;padding-top:14px;border-top:var(--bw) solid var(--border);}

.main{display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:var(--bw) solid var(--border);background:var(--surface);flex:none;}
.topbar .crumb{font-size:11px;color:var(--text-muted);}
.topbar h1{font-size:var(--fs-h1);font-weight:700;}
.search{margin-left:auto;display:flex;align-items:center;gap:8px;background:var(--bg);border:var(--bw) solid var(--border);border-radius:var(--r-pill);padding:7px 14px;color:var(--text-muted);min-width:230px;}
.search svg{width:15px;height:15px;flex:none;}
.search input{border:none;background:none;outline:none;font:inherit;color:var(--text);width:100%;}
.actingbar{display:flex;align-items:center;gap:8px;}
.actingbar .lbl{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.actingbar select{font:inherit;font-size:12.5px;padding:6px 10px;border:var(--bw) solid var(--border-strong);border-radius:var(--r-sm);background:var(--surface);color:var(--text);cursor:pointer;}
.content{padding:24px;overflow:auto;flex:1;}

/* ---- buttons ---- */
.btn{font-weight:var(--fw-semibold);font-size:var(--fs-body);display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--r-sm);border:var(--bw) solid transparent;cursor:pointer;transition:var(--t-fast);white-space:nowrap;}
.btn svg{width:15px;height:15px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-primary:active{background:var(--accent-active);}
.btn-ghost{background:var(--surface);color:var(--text);border-color:var(--border);}
.btn-ghost:hover{background:var(--bg);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{filter:brightness(.94);}
.btn-sm{padding:5px 10px;font-size:var(--fs-sm);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn:focus-visible{outline:none;box-shadow:var(--focus-ring);}
.iconbtn{background:none;border:none;cursor:pointer;color:var(--text-faint);padding:6px;border-radius:var(--r-sm);display:grid;place-items:center;}
.iconbtn:hover{color:var(--accent);background:var(--accent-soft);}
.iconbtn svg{width:16px;height:16px;}

/* ---- badges ---- */
.badge{font-size:var(--fs-xs);font-weight:600;padding:3px 9px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
.badge.nodot::before{display:none;}
.b-success{background:var(--success-soft);color:var(--success);}
.b-warning{background:var(--warning-soft);color:var(--warning);}
.b-danger{background:var(--danger-soft);color:var(--danger);}
.b-muted{background:color-mix(in srgb,var(--text-muted) 12%,transparent);color:var(--text-muted);}
.b-accent{background:var(--accent-soft);color:var(--accent);}

/* ---- panels / cards ---- */
.panel{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r-md);overflow:hidden;}
.panel-head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:var(--bw) solid var(--border);}
.panel-head h2{font-size:var(--fs-h2);font-weight:700;}
.panel-head .sub{font-size:12px;color:var(--text-muted);}
.spacer{margin-left:auto;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat{background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r-md);padding:14px 16px;}
.stat .k{font-size:11.5px;color:var(--text-muted);font-weight:600;display:flex;align-items:center;gap:6px;}
.stat .k svg{width:14px;height:14px;color:var(--accent);}
.stat .v{font-size:var(--fs-stat);font-weight:700;letter-spacing:-.5px;margin-top:5px;}
.stat .v small{font-size:13px;font-weight:500;color:var(--text-muted);}

/* ---- attention strip ---- */
.attention{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.att{display:flex;align-items:center;gap:9px;padding:10px 14px;border-radius:var(--r-md);font-size:12.5px;font-weight:500;flex:1;min-width:200px;}
.att svg{width:16px;height:16px;flex:none;}
.att b{font-weight:700;}
.att-danger{background:var(--danger-soft);color:var(--danger);}
.att-warning{background:var(--warning-soft);color:var(--warning);}
.att-ok{background:var(--success-soft);color:var(--success);}

/* ---- filters ---- */
.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.filters select{font:inherit;font-size:12.5px;padding:7px 10px;border:var(--bw) solid var(--border-strong);border-radius:var(--r-sm);background:var(--surface);color:var(--text);cursor:pointer;}
.filters .chk{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text-muted);cursor:pointer;}

/* ---- table ---- */
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;font-size:var(--fs-label);letter-spacing:.6px;text-transform:uppercase;color:var(--text-faint);font-weight:600;padding:10px 18px;border-bottom:var(--bw) solid var(--border);}
tbody td{padding:11px 18px;border-bottom:var(--bw) solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr{cursor:pointer;transition:var(--t-fast);}
tbody tr:hover{background:color-mix(in srgb,var(--accent) 4%,transparent);}
.person{display:flex;align-items:center;gap:11px;}
.avatar{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:600;color:#fff;flex:none;}
.avatar.lg{width:56px;height:56px;font-size:18px;}
.nm{font-weight:600;}
.em{font-size:11.5px;color:var(--text-muted);}
.mono{font-family:var(--font-mono);font-size:var(--fs-mono);color:var(--text-muted);}
.muted{color:var(--text-muted);}
.archived-row{opacity:.55;}

/* ---- profile ---- */
.backlink{display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);background:none;border:none;cursor:pointer;font-size:13px;font-weight:500;margin-bottom:16px;padding:0;}
.backlink:hover{color:var(--accent);}
.backlink svg{width:16px;height:16px;}
.prof-head{display:flex;align-items:center;gap:16px;background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r-md);padding:20px 22px;margin-bottom:18px;}
.prof-head .meta h2{font-size:20px;font-weight:700;}
.prof-head .meta .role{color:var(--text-muted);font-size:13.5px;margin-top:3px;}
.prof-head .badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.prof-head .acts{margin-left:auto;display:flex;gap:8px;}
.prof-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start;}
.field-row{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:var(--bw) solid var(--border);font-size:13px;}
.field-row:last-child{border-bottom:none;}
.field-row .k{color:var(--text-muted);}
.field-row .v{font-weight:500;text-align:right;}
.restricted{color:var(--text-faint);font-style:italic;display:inline-flex;align-items:center;gap:5px;}
.restricted svg{width:13px;height:13px;}
.train-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:var(--bw) solid var(--border);}
.train-item:last-child{border-bottom:none;}
.train-item .ti{flex:1;}
.train-item .ti .t{font-weight:600;font-size:13px;}
.train-item .ti .d{font-size:11.5px;color:var(--text-muted);margin-top:2px;}
.feed .item{display:flex;gap:11px;padding:12px 18px;border-bottom:var(--bw) solid var(--border);}
.feed .item:last-child{border-bottom:none;}
.feed .ic{width:28px;height:28px;border-radius:7px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex:none;}
.feed .ic svg{width:15px;height:15px;}
.feed .tx{font-size:12.5px;line-height:1.45;}
.feed .tx .src{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);display:block;margin-top:3px;}
.placeholder{text-align:center;padding:60px 20px;color:var(--text-muted);}
.placeholder svg{width:42px;height:42px;color:var(--text-faint);margin-bottom:14px;}
.placeholder h2{font-size:17px;color:var(--text);margin-bottom:6px;}
.empty{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:13px;}

/* ---- homescreen ---- */
.home{max-width:1000px;margin:0 auto;}
.home-hero{position:relative;text-align:center;padding:48px 20px 40px;margin-bottom:28px;border-radius:var(--r-lg);overflow:hidden;
  background:linear-gradient(180deg,var(--accent-soft) 0%,var(--surface) 100%);border:var(--bw) solid var(--border);}
.home-hero::before{content:"";position:absolute;inset:0;opacity:.5;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:32px 32px;-webkit-mask-image:radial-gradient(ellipse at top,#000,transparent 70%);mask-image:radial-gradient(ellipse at top,#000,transparent 70%);}
.home-hero>*{position:relative;}
.home-eyebrow{font-size:var(--fs-label);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.home-title{font-size:32px;font-weight:700;letter-spacing:-.6px;}
.home-sub{color:var(--text-muted);font-size:14px;margin:8px 0 0;}
.home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.appcard{text-align:left;background:var(--surface);border:var(--bw) solid var(--border);border-radius:var(--r-md);padding:20px;cursor:pointer;transition:var(--t-fast);font-family:inherit;display:flex;flex-direction:column;gap:4px;}
.appcard:hover{border-color:var(--accent-border);box-shadow:var(--shadow-md);transform:translateY(-2px);}
.appcard:focus-visible{outline:none;box-shadow:var(--focus-ring);border-color:var(--accent);}
.appcard-ic{width:42px;height:42px;border-radius:var(--r-md);background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;margin-bottom:10px;}
.appcard-ic svg{width:20px;height:20px;}
.appcard-name{font-size:14.5px;font-weight:700;display:flex;align-items:center;gap:8px;}
.appcard-tag{font-size:9.5px;font-weight:600;letter-spacing:.4px;color:var(--text-faint);border:1px solid var(--border-strong);padding:1px 5px;border-radius:4px;}
.appcard-desc{font-size:12.5px;color:var(--text-muted);}

/* ---- modal ---- */
.overlay{position:fixed;inset:0;background:rgba(20,20,35,.4);display:grid;place-items:center;padding:20px;z-index:100;}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-pop);width:min(560px,100%);max-height:90vh;overflow:auto;}
.modal-head{display:flex;align-items:center;padding:18px 22px;border-bottom:var(--bw) solid var(--border);}
.modal-head h2{font-size:16px;font-weight:700;}
.modal-body{padding:22px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:var(--bw) solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid .full{grid-column:1 / -1;}
.field label{font-size:var(--fs-sm);font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px;}
.field input,.field select{font:inherit;font-size:13px;width:100%;padding:8px 11px;background:var(--surface);color:var(--text);border:var(--bw) solid var(--border-strong);border-radius:var(--r-sm);}
.field input:focus,.field select:focus{outline:none;box-shadow:var(--focus-ring);border-color:var(--accent);}
.field .hint{font-size:11px;color:var(--text-faint);margin-top:4px;}

/* ---- toast ---- */
#toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:200;}
.toast{background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--r-sm);font-size:13px;box-shadow:var(--shadow-md);animation:rise .25s ease;}
.toast.danger{background:var(--danger);}
.toast.success{background:var(--success);}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

@media (max-width:900px){
  #app{grid-template-columns:1fr;}
  .side{display:none;}
  .prof-grid{grid-template-columns:1fr;}
  .stats{grid-template-columns:repeat(2,1fr);}
  .form-grid{grid-template-columns:1fr;}
  .home-grid{grid-template-columns:1fr;}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="app">
  <aside class="side">
    <div class="logo" id="homeLogo" title="Go to home">
      <div class="mark"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></div>
      <div class="name">Medical Suite<small>MAMA MedEvac</small></div>
    </div>
    <div class="navlabel">Workspace</div>
    <nav class="nav" id="nav-main"></nav>
    <div class="navlabel">System</div>
    <nav class="nav" id="nav-sys"></nav>
    <div class="bottom">
      <nav class="nav" id="nav-bottom"></nav>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div>
        <div class="crumb" id="crumb">Workspace</div>
        <h1 id="title">Personnel</h1>
      </div>
      <div class="search" style="position:relative;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="search" placeholder="Search staff &amp; inventory…" autocomplete="off">
        <div id="searchResults" style="display:none;position:absolute;top:calc(100% + 6px);right:0;width:340px;max-width:80vw;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-pop);max-height:360px;overflow:auto;z-index:300;padding:6px;"></div>
      </div>
      <div class="actingbar">
        <span class="lbl">Acting as</span>
        <select id="acting"></select>
      </div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toasts"></div>

<script>
/* ============================================================
   MEDICAL SUITE — shell + Personnel Management (v1)
   Vanilla JS, no build step. Deploy by uploading to GitHub Pages.
   ============================================================ */

/* ---------- icons ---------- */
const I = {
  users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  box:'<path d="M21 8V21H3V8"/><rect x="1" y="3" width="22" height="5" rx="1"/><path d="M10 12h4"/>',
  file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h6"/>',
  roster:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4M7 14h3v3H7z"/>',
  calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/>',
  book:'<path d="M4 19.5V5a2 2 0 0 1 2-2h13v18H6a2 2 0 0 0-2 1.5"/><path d="M9 7h6"/>',
  dispatch:'<path d="M3 11l19-9-9 19-2-8z"/>',
  clock:'<path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.74.65 1.65 1.65 0 0 0-1 1.51V22a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 20.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H2a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 3.6 8a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8 3.6h.09A1.65 1.65 0 0 0 9 2.09V2a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 3.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 20.4 8v.09a1.65 1.65 0 0 0 1.51 1H22a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  minus:'<path d="M5 12h14"/>',
  filter:'<path d="M3 6h18M6 12h12M9 18h6"/>',
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/>',

const SCHEMA_VERSION = 1;
/* DATA_VERSION: bump this during development whenever the SEED roster changes,
   to force the app to refresh to the latest seed instead of showing stale saved
   data. Once real data is being entered, stop bumping it and rely on migrate()
   + export/import so nothing gets wiped. */
const DATA_VERSION = 5;
function migrate(d){
  if(!d.schemaVersion) d.schemaVersion = 1;
  if(!Array.isArray(d.departments)) d.departments = DEPARTMENTS.slice();
  /* inventory entities — tolerate stores saved before Inventory existed */
  if(!Array.isArray(d.itemTypes)) d.itemTypes = [];
  if(!Array.isArray(d.stockLines)) d.stockLines = [];
  if(!Array.isArray(d.bags)) d.bags = [];
  if(!Array.isArray(d.inventoryCategories)) d.inventoryCategories = INVENTORY_CATEGORIES.slice();
  if(!Array.isArray(d.stockSnapshots)) d.stockSnapshots = [];
  /* future upgrades go here, e.g.:
     if(d.schemaVersion < 2){ d.personnel.forEach(p=>p.newField=null); d.schemaVersion=2; } */
  return d;
}

let STORE = Persist.load();
if(!STORE || STORE.dataVersion !== DATA_VERSION){ STORE = seed(); Persist.save(STORE); }
else { STORE = migrate(STORE); Persist.save(STORE); }
let currentUserId = STORE.personnel.find(p=>p.accessRole==='Admin' && p.lifecycle==='Active')?.id || STORE.personnel[0]?.id;

  invDetailId:null, iCat:'', iStock:'', iExpiry:'', iSort:'name', iLoc:'Store', iView:'overview', iCount:false, iShowArchived:false, showSnaps:false, snapId:null};

const $=s=>document.querySelector(s);
function commit(){ Persist.save(STORE); }
function currentUser(){ return STORE.personnel.find(p=>p.id===currentUserId); }
function personById(id){ return STORE.personnel.find(p=>p.id===id); }
function courseById(id){ return STORE.courseTypes.find(c=>c.id===id); }
function fullName(p){ return (p.title?p.title+' ':'')+p.firstName+' '+p.lastName; }
function initials(p){ return (p.firstName[0]||'')+(p.lastName[0]||''); }
function nextId(){ const n=STORE.personnel.reduce((m,p)=>Math.max(m,parseInt(p.id.split('-')[1])||0),1041); return 'PR-'+(n+1); }

/* ---------- training status logic ---------- */
function effStatus(rec){
  if(rec.status==='Completed' && rec.expiryDate && new Date(rec.expiryDate) < today) return 'Expired';
  if(rec.status==='Required' && rec.dueDate && new Date(rec.dueDate) < today) return 'Overdue';
  return rec.status;
}
function isExpiringSoon(rec){
  if(rec.status!=='Completed' || !rec.expiryDate) return false;
  const exp=new Date(rec.expiryDate); const soon=new Date(today); soon.setDate(soon.getDate()+60);
  return exp>=today && exp<=soon;
}
function trainBadge(rec){
  const s=effStatus(rec);
  if(s==='Expired'||s==='Overdue') return `<span class="badge b-danger">${s}</span>`;
  if(s==='Completed' && isExpiringSoon(rec)) return `<span class="badge b-warning">Expiring soon</span>`;
  if(s==='Completed') return `<span class="badge b-success">Valid</span>`;
  if(s==='In progress') return `<span class="badge b-warning">In progress</span>`;
  return `<span class="badge b-muted">Required</span>`;
}

/* ---------- inventory helpers + derived status ---------- */
function itemTypeById(id){ return STORE.itemTypes.find(t=>t.id===id); }
function stockLineById(id){ return STORE.stockLines.find(l=>l.id===id); }
function bagById(id){ return STORE.bags.find(b=>b.id===id); }
function locationName(loc){ return loc===STORE_LOCATION ? 'Store' : (bagById(loc)?.name || loc); }
function locationOptions(){ return [STORE_LOCATION, ...STORE.bags.filter(b=>b.lifecycle==='Active').map(b=>b.id)]; }
function nextItemTypeId(){ const n=STORE.itemTypes.reduce((m,t)=>Math.max(m,parseInt(t.id.split('-')[1])||0),1000); return 'IT-'+(n+1); }
function nextStockLineId(){ const n=STORE.stockLines.reduce((m,l)=>Math.max(m,parseInt(l.id.split('-')[1])||0),2000); return 'SL-'+(n+1); }
function nextBagId(){ const n=STORE.bags.reduce((m,b)=>Math.max(m,parseInt(b.id.split('-')[1])||0),0); return 'BG-'+(n+1); }
function nextSnapshotId(){ const n=STORE.stockSnapshots.reduce((m,s)=>Math.max(m,parseInt(s.id.split('-')[1])||0),0); return 'SS-'+(n+1); }
function activeLinesFor(itId){ return STORE.stockLines.filter(l=>l.itemTypeId===itId && l.lifecycle==='Active'); }
function itemTotal(itId){ return activeLinesFor(itId).reduce((s,l)=>s+(Number(l.quantity)||0),0); }

/* stock status — per line, against par */
function stockStatus(line){
  const q=Number(line.quantity)||0;
  if(q<=0) return 'Out';
  if(line.parLevel!=null && q<=line.parLevel) return 'Low';
  return 'In';
}
function stockBadge(line){
  const s=stockStatus(line);
  if(s==='Out') return `<span class="badge b-danger">Out of stock</span>`;
  if(s==='Low') return `<span class="badge b-warning">Low${line.location!==STORE_LOCATION?' · below par':''}</span>`;
  return `<span class="badge b-success">${line.location===STORE_LOCATION?'In stock':'At par'}</span>`;
}
/* expiry status — per line, reusing the 60-day window from training */
function lineExpiry(line){
  if(!line.expiryDate) return 'None';
  const exp=new Date(line.expiryDate); const soon=new Date(today); soon.setDate(soon.getDate()+60);
  if(exp<today) return 'Expired';
  if(exp<=soon) return 'Soon';
  return 'OK';
}
function expiryBadge(line){
  const s=lineExpiry(line);
  if(s==='Expired') return `<span class="badge b-danger">Expired ${line.expiryDate}</span>`;
  if(s==='Soon') return `<span class="badge b-warning">Expires ${line.expiryDate}</span>`;
  if(s==='OK') return `<span class="muted" style="font-size:12px;">${line.expiryDate}</span>`;
  return `<span class="muted" style="font-size:12px;">—</span>`;
}

/* ---------- activity ---------- */
/* tool/targetType default to Personnel so every existing call keeps working unchanged;
   Inventory (and later Dispatch) pass their own. */
function logActivity(action,targetId,detail,summary,tool='Personnel',targetType='Personnel'){
  STORE.activityLog.unshift({id:'AL-'+Date.now()+'-'+Math.random().toString(36).slice(2,5),timestamp:new Date().toISOString(),
    actorId:currentUserId,tool,action,targetType,targetId,detail:detail||{},summary});
  commit();
}

/* ---------- toast ---------- */
function toast(msg,type=''){ const t=document.createElement('div'); t.className='toast '+type; t.textContent=msg;
  $('#toasts').appendChild(t); setTimeout(()=>t.remove(),2600); }

/* ---------- export / import ---------- */
function exportData(){
  const blob=new Blob([JSON.stringify(STORE,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='medical-suite-backup-'+today.toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Backup downloaded','success');
}
function importData(file){
  const reader=new FileReader();
  reader.onload=e=>{ try{
    let data=JSON.parse(e.target.result);
    if(!data || !Array.isArray(data.personnel)) throw new Error('not a Medical Suite backup');
    data=migrate(data); data.dataVersion=DATA_VERSION; STORE=data; commit();
    currentUserId=STORE.personnel.find(p=>p.accessRole==='Admin')?.id||STORE.personnel[0]?.id;
    state={view:'personnel',profileId:null,search:'',fJob:'',fDept:'',fDuty:'',showArchived:false};
    renderShell(); render(); toast('Data imported','success');
  }catch(err){ toast('Import failed — '+err.message,'danger'); } };
  reader.readAsText(file);
}

/* ---------- global search (staff + inventory) ---------- */
function hideSearchResults(){ const r=$('#searchResults'); if(r){ r.style.display='none'; r.innerHTML=''; } }
function gotoSearchResult(kind,id){
  hideSearchResults(); const si=$('#search'); if(si) si.value=''; state.search='';
  if(kind==='person'){ state.view='personnel'; state.profileId=id; }
  else { state.view='inventory'; state.invDetailId=id; state.iCount=false; }
  renderShell(); render();
}
function updateSearchResults(qRaw){
  const r=$('#searchResults'); if(!r) return;
  const q=(qRaw||'').trim().toLowerCase();
  if(q.length<1){ hideSearchResults(); return; }
  const people=STORE.personnel.filter(p=>p.lifecycle==='Active' &&
    (fullName(p).toLowerCase().includes(q)||p.id.toLowerCase().includes(q)||p.jobRole.toLowerCase().includes(q)||(p.department||'').toLowerCase().includes(q))).slice(0,5);
  const items=STORE.itemTypes.filter(t=>t.lifecycle==='Active' &&
    (t.name.toLowerCase().includes(q)||(t.category||'').toLowerCase().includes(q))).slice(0,7);
  const grp=t=>`<div style="font-size:var(--fs-label);letter-spacing:.6px;text-transform:uppercase;color:var(--text-faint);font-weight:600;padding:8px 8px 4px;">${t}</div>`;
  let html='';
  if(people.length){ html+=grp('Staff')+people.map(p=>`<div class="sres" data-kind="person" data-id="${p.id}" style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-sm);cursor:pointer;">
    <div class="avatar" style="width:26px;height:26px;font-size:10px;background:${p.avatarColor}">${initials(p)}</div>
    <div style="min-width:0;"><div class="nm" style="font-size:13px;">${fullName(p)}</div><div class="em">${p.jobRole} · ${p.department}</div></div></div>`).join(''); }
  if(items.length){ html+=grp('Inventory')+items.map(t=>{const total=itemTotal(t.id);const locs=activeLinesFor(t.id).length;return `<div class="sres" data-kind="item" data-id="${t.id}" style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-sm);cursor:pointer;">
    <div class="appcard-ic" style="width:26px;height:26px;margin:0;border-radius:var(--r-sm);">${svg('box',2)}</div>
    <div style="min-width:0;"><div class="nm" style="font-size:13px;">${t.name}</div><div class="em">${t.category} · ${total} on hand · ${locs} ${locs===1?'location':'locations'}</div></div></div>`;}).join(''); }
  if(!html) html=`<div class="empty" style="padding:18px;">No staff or items match “${qRaw}”.</div>`;
  r.innerHTML=html; r.style.display='block';
  r.querySelectorAll('.sres').forEach(el=>{
    el.onmousedown=ev=>{ ev.preventDefault(); gotoSearchResult(el.dataset.kind, el.dataset.id); };
    el.onmouseenter=()=>el.style.background='var(--accent-soft)';
    el.onmouseleave=()=>el.style.background='';
  });
}

function renderDirectory(c){
  const active=STORE.personnel.filter(p=>state.showArchived?true:p.lifecycle==='Active');
  const q=state.search.toLowerCase();
  let rows=active.filter(p=>{
    if(state.fJob && p.jobRole!==state.fJob) return false;
    if(state.fDept && p.department!==state.fDept) return false;
    if(state.fDuty && p.dutyStatus!==state.fDuty) return false;
    if(q && !(fullName(p).toLowerCase().includes(q)||p.id.toLowerCase().includes(q)||p.jobRole.toLowerCase().includes(q))) return false;
    return true;
  });
  // attention figures across active staff
  let expired=0,soon=0,due=0;
  STORE.personnel.filter(p=>p.lifecycle==='Active').forEach(p=>(p.trainingRecords||[]).forEach(r=>{
    const s=effStatus(r); if(s==='Expired')expired++; else if(s==='Overdue')due++; else if(isExpiringSoon(r))soon++;

/* ---------- department management ---------- */
function addDepartment(name){
  name=(name||'').trim();
  if(!name){ toast('Enter a department name','danger'); return; }
  if(STORE.departments.some(d=>d.toLowerCase()===name.toLowerCase())){ toast('That department already exists','danger'); return; }
  STORE.departments.push(name); commit(); toast(name+' added','success'); render();
}
function openRenameDept(oldName){
  openModal(`<div class="modal" style="width:min(440px,100%)">
    <div class="modal-head"><h2>Rename department</h2></div>
    <div class="modal-body"><div class="field"><label>Department name</label><input class="input" id="renameInput" value="${oldName}"><div class="hint">Everyone currently in “${oldName}” will be moved to the new name.</div></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" id="cancel">Cancel</button><button class="btn btn-primary" id="confirm">Save</button></div>
  </div>`);
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{
    const nn=$('#renameInput').value.trim();
    if(!nn){ toast('Name can\u2019t be empty','danger'); return; }
    if(nn===oldName){ closeModal(); return; }
    if(STORE.departments.some(d=>d.toLowerCase()===nn.toLowerCase())){ toast('That department already exists','danger'); return; }
    STORE.departments=STORE.departments.map(d=>d===oldName?nn:d);
    STORE.personnel.forEach(p=>{ if(p.department===oldName) p.department=nn; });
    commit(); toast('Department renamed','success'); closeModal(); render();
  };
}
function deleteDepartment(name){
  const inUse=STORE.personnel.filter(p=>p.department===name && p.lifecycle==='Active').length;
  if(inUse){ toast(`Can\u2019t delete — ${inUse} ${inUse===1?'person is':'people are'} in ${name}. Move them first.`,'danger'); return; }
  openModal(confirmModal('Delete '+name+'?','No active staff are assigned to this department, so it\u2019s safe to remove. This only affects the list of choices, not any records.','Delete department','btn-danger'));
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{ STORE.departments=STORE.departments.filter(d=>d!==name); commit(); toast(name+' deleted'); closeModal(); render(); };
}

/* ---------- course catalog management ---------- */
function courseHolders(ctId){ return STORE.personnel.reduce((n,p)=>n+(p.trainingRecords||[]).filter(r=>r.courseTypeId===ctId).length,0); }
function nextCourseId(){ const n=STORE.courseTypes.reduce((m,c)=>Math.max(m,parseInt(c.id.split('-')[1])||0),0); return 'CT-'+(n+1); }
function openCourseForm(id){
  const ct=id?courseById(id):null; const editing=!!ct;
  openModal(`<div class="modal" style="width:min(480px,100%)">
    <div class="modal-head"><h2>${editing?'Edit course':'Add course'}</h2></div>
    <div class="modal-body"><div class="form-grid">
      <div class="field full"><label>Course name</label><input class="input" id="c_name" value="${editing?ct.name:''}" placeholder="e.g. Basic Life Support (BLS)"></div>
      <div class="field"><label>Category</label><select id="c_cat">${CATEGORIES.map(x=>`<option ${editing&&ct.category===x?'selected':''}>${x}</option>`).join('')}</select></div>
      <div class="field"><label>Valid for (months)</label><input class="input" id="c_val" type="number" min="0" value="${editing&&ct.validityMonths?ct.validityMonths:''}" placeholder="blank = never expires"><div class="hint">Drives automatic expiry.</div></div>
    </div></div>
    <div class="modal-foot"><button class="btn btn-ghost" id="cancel">Cancel</button><button class="btn btn-primary" id="confirm">${editing?'Save changes':'Add course'}</button></div>
  </div>`);
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{
    const name=$('#c_name').value.trim();
    if(!name){ toast('Course name is required','danger'); return; }
    if(STORE.courseTypes.some(x=>x.name.toLowerCase()===name.toLowerCase() && x.id!==(ct&&ct.id))){ toast('A course with that name already exists','danger'); return; }
    const valRaw=$('#c_val').value.trim(); const validityMonths=valRaw?Math.max(0,parseInt(valRaw))||null:null;
    const category=$('#c_cat').value;
    if(editing){ ct.name=name; ct.category=category; ct.validityMonths=validityMonths; toast('Course updated','success'); }
    else{ STORE.courseTypes.push({id:nextCourseId(),name,category,validityMonths,mandatoryFor:[],materialsRef:''}); toast(name+' added','success'); }
    commit(); closeModal(); render();
  };
}
function deleteCourse(id){
  const ct=courseById(id); const n=courseHolders(id);
  if(n){ toast(`Can\u2019t delete — ${n} ${n===1?'person holds':'people hold'} a record for ${ct.name}. Remove those first.`,'danger'); return; }
  openModal(confirmModal('Delete '+ct.name+'?','No one holds a record for this course, so it\u2019s safe to remove from the catalog.','Delete course','btn-danger'));
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{ STORE.courseTypes=STORE.courseTypes.filter(x=>x.id!==id); commit(); toast(ct.name+' deleted'); closeModal(); render(); };
}

/* ============================================================
   INVENTORY  (Store v1 — ItemType + StockLine, location-aware)
   ============================================================ */
/* readiness of a location (a bag is "ready" when fully stocked & in date) */
function bagReadiness(locId){
  const lines=STORE.stockLines.filter(l=>l.location===locId && l.lifecycle==='Active' && (itemTypeById(l.itemTypeId)?.lifecycle==='Active'));
  let ok=0,short=0,out=0,expired=0;
  lines.forEach(l=>{ const s=stockStatus(l); const e=lineExpiry(l);
    if(e==='Expired') expired++;
    if(s==='Out') out++; else if(s==='Low') short++; else ok++; });
  return {total:lines.length, ok, short, out, expired, ready:lines.length>0 && out===0 && short===0 && expired===0};
}
function readinessBadge(r){
  if(r.total===0) return `<span class="badge b-muted nodot">Empty</span>`;
  if(r.out||r.expired) return `<span class="badge b-danger">Not ready</span>`;
  if(r.short) return `<span class="badge b-warning">Short</span>`;
  return `<span class="badge b-success">Ready</span>`;
}
function downloadBlob(filename,text,mime){
  const blob=new Blob([text],{type:mime}); const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function exportInventoryCSV(lines,label){
  const esc=v=>{ v=(v==null?'':String(v)); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const head=['Item','Category','Location','Unit','On hand','Par','Stock status','Expiry','Lot'];
  const rows=lines.map(l=>{ const it=itemTypeById(l.itemTypeId); const s=stockStatus(l);
    const st=s==='Out'?'Out of stock':(s==='Low'?'Low / below par':'In stock');
    return [it?it.name:'?',it?it.category:'',locationName(l.location),it?it.defaultUnit:'',l.quantity,(l.parLevel!=null?l.parLevel:''),st,(l.expiryDate||''),(l.lotNumber||'')].map(esc).join(','); });
  const csv=[head.join(','),...rows].join('\n');
  downloadBlob('inventory-'+label.replace(/[^a-z0-9]+/gi,'-').toLowerCase()+'-'+today.toISOString().slice(0,10)+'.csv', csv, 'text/csv');
  toast('CSV exported','success');
}
function saveCounts(){
  let changed=0;
  document.querySelectorAll('input[data-count]').forEach(inp=>{
    const l=stockLineById(inp.dataset.count); if(!l) return;
    const to=Math.max(0,parseInt(inp.value)||0); const from=Number(l.quantity)||0;
    if(to!==from){ const it=itemTypeById(l.itemTypeId); l.quantity=to; l.updatedAt=new Date().toISOString().slice(0,10); changed++;
      logActivity('counted',l.id,{itemType:it.name,location:l.location,from,to},`${fullName(currentUser())} counted ${it.name} at ${locationName(l.location)}: ${from} → ${to}`,'Inventory','StockLine'); }
  });
  commit(); state.iCount=false;
  toast(changed?`${changed} count${changed>1?'s':''} saved — consider freezing a stock take`:'No changes', changed?'success':'');
  render();
}

    if(!state.iShowArchived && archived) return false;
    if(state.iCat && it.category!==state.iCat) return false;
    if(state.iStock){ const s=stockStatus(l); if(state.iStock==='Out'&&s!=='Out')return false; if(state.iStock==='Low'&&s!=='Low')return false; if(state.iStock==='In'&&s!=='In')return false; }
    if(state.iExpiry){ const e=lineExpiry(l);
      if(state.iExpiry==='Expired'&&e!=='Expired')return false;
      if(state.iExpiry==='Soon'&&e!=='Soon')return false;

function openAdjust(lineId,kind){
  const l=stockLineById(lineId); const it=itemTypeById(l.itemTypeId); const dispense=kind==='dispense';
  openModal(`<div class="modal" style="width:min(420px,100%)">
    <div class="modal-head"><h2>${dispense?'Dispense':'Restock'} — ${it.name}</h2></div>
    <div class="modal-body">
      <p class="muted" style="margin:0 0 14px;font-size:13px;">${locationName(l.location)} · currently <b>${l.quantity}</b>${it.defaultUnit?' '+it.defaultUnit:''}.</p>
      <div class="field"><label>${dispense?'Quantity to dispense':'Quantity to add'}</label><input id="adj_qty" type="number" min="1" value="1"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" id="cancel">Cancel</button><button class="btn ${dispense?'btn-primary':'btn-primary'}" id="go">${dispense?'Dispense':'Restock'}</button></div>
  </div>`);
  $('#cancel').onclick=closeModal;
  $('#go').onclick=()=>{
    const n=Math.max(1,parseInt($('#adj_qty').value)||0);
    if(dispense && n>l.quantity){ toast(`Only ${l.quantity} on hand`,'danger'); return; }
    adjustStock(lineId, dispense?-n:n);
    closeModal(); render();
  };
}

/* core adjust — used by the Inventory UI (actor is a person working in Inventory) */
function adjustStock(lineId,delta){
  const l=stockLineById(lineId); const it=itemTypeById(l.itemTypeId);
  const from=Number(l.quantity)||0; const to=Math.max(0,from+delta);
  l.quantity=to; l.updatedAt=new Date().toISOString().slice(0,10); commit();
  const dispensed=delta<0;
  logActivity(dispensed?'dispensed':'restocked',l.id,{itemType:it.name,location:l.location,qty:Math.abs(delta),from,to},
    `${fullName(currentUser())} ${dispensed?'dispensed':'restocked'} ${Math.abs(delta)} × ${it.name} ${dispensed?'from':'to'} ${locationName(l.location)}`,'Inventory','StockLine');
  toast(`${dispensed?'Dispensed':'Restocked'} ${Math.abs(delta)} · ${it.name} now ${to}`, dispensed?'':'success');
}

/* Dispatch contract (data model §7) — when Dispatch exists it calls THIS to decrement a
   bag/store line during a callout. Same event shape; zero changes needed in Inventory. */
function applyDispense({stockLineId,qty,actorId}){
  const l=stockLineById(stockLineId); if(!l) return false;
  const it=itemTypeById(l.itemTypeId); const from=Number(l.quantity)||0; const to=Math.max(0,from-qty);
  l.quantity=to; l.updatedAt=new Date().toISOString().slice(0,10);
  STORE.activityLog.unshift({id:'AL-'+Date.now()+'-'+Math.random().toString(36).slice(2,5),timestamp:new Date().toISOString(),
    actorId:actorId||currentUserId,tool:'Dispatch',action:'dispensed',targetType:'StockLine',targetId:l.id,
    detail:{itemType:it.name,location:l.location,qty,from,to},summary:`Dispatch dispensed ${qty} × ${it.name} from ${locationName(l.location)}`});
  commit(); return true;
}

function archiveLine(lineId){
  const l=stockLineById(lineId); const it=itemTypeById(l.itemTypeId);
  openModal(confirmModal('Archive this stock line?',`Removes ${it.name} at ${locationName(l.location)} from active counts. History stays intact and you can reactivate it anytime.`,'Archive','btn-ghost'));
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{ l.lifecycle='Archived'; commit();
    logActivity('archived_item',l.id,{itemType:it.name,location:l.location},`${fullName(currentUser())} archived ${it.name} at ${locationName(l.location)}`,'Inventory','StockLine');
    toast('Stock line archived'); closeModal(); render(); };
}
function reactivateLine(lineId){
  const l=stockLineById(lineId); const it=itemTypeById(l.itemTypeId); l.lifecycle='Active'; commit();
  logActivity('reactivated_item',l.id,{itemType:it.name,location:l.location},`${fullName(currentUser())} reactivated ${it.name} at ${locationName(l.location)}`,'Inventory','StockLine');
  toast('Stock line reactivated','success'); render();
}
function hardDeleteLine(lineId){
  const l=stockLineById(lineId); const it=itemTypeById(l.itemTypeId);
  openModal(confirmModal('Permanently delete this stock line?','Deleting is meant only for lines created in error — archiving is safer and keeps the audit trail. This cannot be undone.','Delete permanently','btn-danger'));
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{ STORE.stockLines=STORE.stockLines.filter(x=>x.id!==lineId); commit(); toast(it.name+' line deleted'); closeModal(); render(); };
}

function archiveItemType(itId){
  const it=itemTypeById(itId);
  openModal(confirmModal('Archive '+it.name+'?','The item and all its stock lines drop out of active lists. History stays intact and you can reactivate anytime.','Archive','btn-ghost'));
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{ it.lifecycle='Archived'; commit();
    logActivity('archived_item',it.id,{itemType:it.name},`${fullName(currentUser())} archived ${it.name}`,'Inventory','ItemType');
    toast(it.name+' archived'); closeModal(); render(); };
}
function reactivateItemType(itId){
  const it=itemTypeById(itId); it.lifecycle='Active'; commit();
  logActivity('reactivated_item',it.id,{itemType:it.name},`${fullName(currentUser())} reactivated ${it.name}`,'Inventory','ItemType');
  toast(it.name+' reactivated','success'); render();
}
function hardDeleteItemType(itId){
  const it=itemTypeById(itId);
  const refs=STORE.stockLines.filter(l=>l.itemTypeId===itId).length;
  openModal(confirmModal('Permanently delete '+it.name+'?',(refs?`This item has <b>${refs}</b> stock ${refs>1?'lines':'line'} across locations, which will also be removed. `:'')+'Deleting is meant only for items created in error — archiving is safer. This cannot be undone.','Delete permanently','btn-danger'));
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{ STORE.itemTypes=STORE.itemTypes.filter(x=>x.id!==itId); STORE.stockLines=STORE.stockLines.filter(l=>l.itemTypeId!==itId); commit();
    toast(it.name+' deleted'); closeModal(); state.invDetailId=null; render(); };
}

/* ---------- stock-take snapshots ---------- */
function openSnapshotForm(){
  const def='Stock take — '+new Date().toISOString().slice(0,10);
  const activeLines=STORE.stockLines.filter(l=>{const it=itemTypeById(l.itemTypeId);return it&&l.lifecycle==='Active'&&it.lifecycle==='Active';});
  openModal(`<div class="modal" style="width:min(440px,100%)">
    <div class="modal-head"><h2>Freeze a stock take</h2></div>
    <div class="modal-body">
      <p class="muted" style="margin:0 0 14px;font-size:13px;">Captures the current count of all <b>${activeLines.length}</b> active stock lines (store and bags) as a dated, read-only record. Live stock keeps moving; this snapshot won't.</p>
      <div class="field"><label>Label</label><input class="input" id="snap_label" value="${def}"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" id="cancel">Cancel</button><button class="btn btn-primary" id="confirm">Freeze it</button></div>
  </div>`);
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{
    const label=$('#snap_label').value.trim()||def;
    const lines=activeLines.map(l=>{const it=itemTypeById(l.itemTypeId);return {stockLineId:l.id,itemTypeId:l.itemTypeId,name:it?it.name:'?',location:l.location,quantity:l.quantity,parLevel:l.parLevel,expiryDate:l.expiryDate};});
    const id=nextSnapshotId();
    STORE.stockSnapshots.push({id,takenAt:new Date().toISOString(),takenBy:currentUserId,label,lines}); commit();
    logActivity('took_snapshot',id,{lines:lines.length},`${fullName(currentUser())} froze a stock take — ${lines.length} lines`,'Inventory','Snapshot');
    toast('Stock take frozen','success'); closeModal(); state.showSnaps=true; state.snapId=id; render();
  };
}

/* ---------- inventory category + bag management ---------- */
function addInvCategory(name){
  name=(name||'').trim();
  if(!name){ toast('Enter a category name','danger'); return; }
  if(STORE.inventoryCategories.some(c=>c.toLowerCase()===name.toLowerCase())){ toast('That category already exists','danger'); return; }
  STORE.inventoryCategories.push(name); commit(); toast(name+' added','success'); render();
}
function openRenameInvCat(oldName){
  openModal(`<div class="modal" style="width:min(440px,100%)">
    <div class="modal-head"><h2>Rename category</h2></div>
    <div class="modal-body"><div class="field"><label>Category name</label><input class="input" id="renameInput" value="${oldName}"><div class="hint">Every item in “${oldName}” will be moved to the new name.</div></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" id="cancel">Cancel</button><button class="btn btn-primary" id="confirm">Save</button></div>
  </div>`);
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{
    const nn=$('#renameInput').value.trim();
    if(!nn){ toast('Name can\u2019t be empty','danger'); return; }
    if(nn===oldName){ closeModal(); return; }
    if(STORE.inventoryCategories.some(c=>c.toLowerCase()===nn.toLowerCase())){ toast('That category already exists','danger'); return; }
    STORE.inventoryCategories=STORE.inventoryCategories.map(c=>c===oldName?nn:c);
    STORE.itemTypes.forEach(t=>{ if(t.category===oldName) t.category=nn; });
    commit(); toast('Category renamed','success'); closeModal(); render();
  };
}
function deleteInvCategory(name){
  const inUse=STORE.itemTypes.filter(t=>t.category===name && t.lifecycle==='Active').length;
  if(inUse){ toast(`Can\u2019t delete — ${inUse} ${inUse===1?'item is':'items are'} in ${name}. Move them first.`,'danger'); return; }
  openModal(confirmModal('Delete '+name+'?','No active items use this category, so it\u2019s safe to remove. This only affects the list of choices.','Delete category','btn-danger'));
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{ STORE.inventoryCategories=STORE.inventoryCategories.filter(c=>c!==name); commit(); toast(name+' deleted'); closeModal(); render(); };
}
function addBag(name){
  name=(name||'').trim();
  if(!name){ toast('Enter a bag name','danger'); return; }
  if(STORE.bags.some(b=>b.name.toLowerCase()===name.toLowerCase())){ toast('That bag already exists','danger'); return; }
  STORE.bags.push({id:nextBagId(),name,lifecycle:'Active'}); commit(); toast(name+' added','success'); render();
}
function openRenameBag(id){
  const b=bagById(id);
  openModal(`<div class="modal" style="width:min(440px,100%)">
    <div class="modal-head"><h2>Rename bag</h2></div>
    <div class="modal-body"><div class="field"><label>Bag name</label><input class="input" id="renameInput" value="${b.name}"></div></div>
    <div class="modal-foot"><button class="btn btn-ghost" id="cancel">Cancel</button><button class="btn btn-primary" id="confirm">Save</button></div>
  </div>`);
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{
    const nn=$('#renameInput').value.trim();
    if(!nn){ toast('Name can\u2019t be empty','danger'); return; }
    if(STORE.bags.some(x=>x.name.toLowerCase()===nn.toLowerCase() && x.id!==id)){ toast('That bag already exists','danger'); return; }
    b.name=nn; commit(); toast('Bag renamed','success'); closeModal(); render();
  };
}
function deleteBag(id){
  const b=bagById(id); const inUse=STORE.stockLines.filter(l=>l.location===id).length;
  if(inUse){ toast(`Can\u2019t delete — ${b.name} still holds ${inUse} stock ${inUse===1?'line':'lines'}. Move or remove them first.`,'danger'); return; }
  openModal(confirmModal('Delete '+b.name+'?','This bag holds no stock, so it\u2019s safe to remove from the list of locations.','Delete bag','btn-danger'));
  $('#cancel').onclick=closeModal;
  $('#confirm').onclick=()=>{ STORE.bags=STORE.bags.filter(x=>x.id!==id); commit(); toast(b.name+' deleted'); closeModal(); render(); };
}

/* ---------- go ---------- */
renderShell();
render();
</script>
